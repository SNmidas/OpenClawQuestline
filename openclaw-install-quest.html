<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation Molty — The OpenClaw Install Dive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#08202B;        /* deep ocean background */
    --abyss-2:#0C2A38;      /* panel */
    --abyss-3:#103645;      /* raised panel */
    --line:#1C4A5C;         /* hairlines */
    --coral:#FF6B57;        /* lobster accent */
    --coral-soft:#FF8C7A;
    --foam:#5FD0C5;         /* seafoam secondary */
    --sand:#E9D6A8;         /* warm highlight */
    --text:#DCEAF0;         /* main text */
    --muted:#7FA0AE;        /* muted text */
    --good:#5FD0C5;
    --warn:#FFC24B;
    --bad:#FF6B57;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(95,208,197,.10), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, rgba(255,107,87,.10), transparent 55%),
      var(--abyss);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.55;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:880px;margin:0 auto;padding:20px 18px 80px}

  /* ---------- HUD ---------- */
  header.hud{
    position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg, rgba(8,32,43,.96), rgba(8,32,43,.86));
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    margin:-20px -18px 22px;
    padding:12px 18px;
  }
  .hud-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;max-width:880px;margin:0 auto}
  .logo{display:flex;align-items:center;gap:9px;font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em;font-size:1.05rem}
  .logo .crab{font-size:1.25rem;filter:drop-shadow(0 0 6px rgba(255,107,87,.5))}
  .hud-spacer{flex:1}
  .stat{display:flex;flex-direction:column;gap:3px;min-width:118px}
  .stat .lab{font-family:'IBM Plex Mono';font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .stat .val{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.02rem;line-height:1}
  .meter{height:6px;border-radius:999px;background:var(--abyss-3);overflow:hidden;border:1px solid var(--line)}
  .meter > i{display:block;height:100%;border-radius:999px;transition:width .5s ease, background .5s ease}
  .guide-btn{
    font-family:'IBM Plex Mono';font-size:.7rem;letter-spacing:.06em;
    background:var(--abyss-3);color:var(--foam);border:1px solid var(--line);
    padding:8px 11px;border-radius:999px;cursor:pointer;white-space:nowrap;
  }
  .guide-btn:hover{border-color:var(--foam)}
  .guide-btn b{color:var(--sand)}

  /* ---------- Progress depth rail ---------- */
  .depthrail{display:flex;gap:6px;margin:0 0 20px;flex-wrap:wrap}
  .depthrail .dot{flex:1;min-width:14px;height:5px;border-radius:999px;background:var(--abyss-3);border:1px solid var(--line)}
  .depthrail .dot.done{background:var(--foam);border-color:var(--foam)}
  .depthrail .dot.cur{background:var(--coral);border-color:var(--coral)}

  /* ---------- Stage card ---------- */
  .card{
    background:linear-gradient(180deg,var(--abyss-2),rgba(12,42,56,.6));
    border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 22px;animation:rise .45s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:'IBM Plex Mono';font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--coral-soft);margin:0 0 8px}
  h1.title{font-family:'Bricolage Grotesque';font-weight:800;letter-spacing:-.02em;font-size:clamp(1.5rem,4vw,2.05rem);line-height:1.08;margin:0 0 4px}
  .story{color:var(--sand);font-size:.98rem;margin:10px 0 4px;font-style:italic;opacity:.95}
  .teach{margin:16px 0 4px}
  .teach p{margin:0 0 11px}
  .teach p:last-child{margin-bottom:0}

  /* terms */
  .t{
    font:inherit;color:var(--foam);background:none;border:none;padding:0;cursor:pointer;
    border-bottom:1.5px dotted var(--foam);line-height:1.2;
  }
  .t:hover,.t:focus{color:#fff;border-bottom-style:solid;outline:none}

  /* command block */
  .cmd{
    font-family:'IBM Plex Mono';font-size:.86rem;background:#061821;border:1px solid var(--line);
    border-left:3px solid var(--coral);border-radius:10px;padding:13px 14px;margin:14px 0;
    color:#CDE8E4;overflow-x:auto;white-space:pre;position:relative;
  }
  .cmd .c-prompt{color:var(--coral-soft);user-select:none}
  .cmd .c-note{color:var(--muted)}
  .cmd-cap{font-family:'IBM Plex Mono';font-size:.64rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin:-4px 0 2px}

  .callout{
    border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:14px 0;font-size:.9rem;
    background:var(--abyss-3);
  }
  .callout.safe{border-color:rgba(95,208,197,.5);background:rgba(95,208,197,.08)}
  .callout.danger{border-color:rgba(255,107,87,.5);background:rgba(255,107,87,.08)}
  .callout .ctitle{font-family:'IBM Plex Mono';font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--foam);display:block;margin-bottom:4px}
  .callout.danger .ctitle{color:var(--coral-soft)}

  /* choices */
  .choices{display:flex;flex-direction:column;gap:12px;margin-top:20px}
  .choice{
    text-align:left;background:var(--abyss-3);border:1px solid var(--line);border-radius:12px;
    padding:15px 16px;cursor:pointer;transition:border-color .15s, transform .1s;width:100%;color:var(--text);font:inherit;
  }
  .choice:hover{border-color:var(--foam);transform:translateY(-1px)}
  .choice:focus-visible{outline:2px solid var(--foam);outline-offset:2px}
  .choice .chead{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .choice .cname{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.05rem}
  .tag{font-family:'IBM Plex Mono';font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:999px;border:1px solid var(--line)}
  .tag.rec{color:var(--abyss);background:var(--foam);border-color:var(--foam)}
  .tag.cost{color:var(--sand);border-color:rgba(233,214,168,.4)}
  .tag.free{color:var(--foam);border-color:rgba(95,208,197,.4)}
  .pc{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-top:10px}
  @media(max-width:520px){.pc{grid-template-columns:1fr}}
  .pc ul{margin:0;padding:0;list-style:none}
  .pc li{font-size:.82rem;padding-left:18px;position:relative;margin-bottom:4px;color:#C3D7DE}
  .pc li::before{position:absolute;left:0;top:0}
  .pc .pro li::before{content:"+";color:var(--good);font-weight:700}
  .pc .con li::before{content:"–";color:var(--coral-soft);font-weight:700}
  .pc h4{font-family:'IBM Plex Mono';font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;margin:0 0 5px;color:var(--muted)}

  /* result + continue */
  .result{animation:rise .35s ease both;margin-top:18px;border-top:1px solid var(--line);padding-top:18px}
  .result .rtitle{font-family:'Bricolage Grotesque';font-weight:700;font-size:1.1rem;margin:0 0 6px}
  .deltas{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
  .delta{font-family:'IBM Plex Mono';font-size:.72rem;padding:4px 9px;border-radius:999px;border:1px solid var(--line)}
  .delta.up{color:var(--good);border-color:rgba(95,208,197,.4)}
  .delta.down{color:var(--coral-soft);border-color:rgba(255,107,87,.4)}
  .delta.spend{color:var(--sand);border-color:rgba(233,214,168,.4)}

  .btn{
    font-family:'Bricolage Grotesque';font-weight:700;font-size:1rem;
    background:var(--coral);color:#3a0f08;border:none;border-radius:10px;
    padding:13px 22px;cursor:pointer;margin-top:6px;transition:filter .15s, transform .1s;
  }
  .btn:hover{filter:brightness(1.08)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--foam);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:var(--foam);filter:none}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* field guide drawer */
  .scrim{position:fixed;inset:0;background:rgba(3,14,19,.6);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100%;width:min(420px,90vw);z-index:50;
    background:var(--abyss-2);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .28s ease;display:flex;flex-direction:column;
  }
  .drawer.open{transform:none}
  .drawer header{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer header h3{font-family:'Bricolage Grotesque';font-weight:800;margin:0;font-size:1.1rem;flex:1}
  .drawer .close{background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 10px;cursor:pointer;font-family:'IBM Plex Mono';font-size:.8rem}
  .drawer .body{overflow-y:auto;padding:8px 18px 24px}
  .gterm{border-bottom:1px solid var(--line);padding:13px 0}
  .gterm:last-child{border-bottom:none}
  .gterm .gname{font-family:'IBM Plex Mono';font-weight:600;color:var(--foam);font-size:.92rem;margin-bottom:3px}
  .gterm .gdef{font-size:.88rem;color:#C3D7DE}
  .gterm.hot{animation:flash 1.1s ease}
  @keyframes flash{0%,100%{background:transparent}25%{background:rgba(95,208,197,.14)}}
  .gempty{color:var(--muted);font-size:.88rem;padding:18px 0}

  /* victory */
  .victory .title{color:var(--foam)}
  .scorecard{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
  @media(max-width:520px){.scorecard{grid-template-columns:1fr}}
  .scorecard .sc{background:var(--abyss-3);border:1px solid var(--line);border-radius:10px;padding:14px}
  .scorecard .sc .n{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.5rem;line-height:1}
  .scorecard .sc .l{font-family:'IBM Plex Mono';font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .recap{list-style:none;padding:0;margin:14px 0}
  .recap li{padding:9px 0 9px 26px;border-bottom:1px solid var(--line);position:relative;font-size:.92rem}
  .recap li::before{content:"🦞";position:absolute;left:0;top:8px;font-size:.85rem}
  .footnote{font-size:.78rem;color:var(--muted);margin-top:18px}

  a{color:var(--foam)}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="hud">
  <div class="hud-row">
    <div class="logo"><span class="crab">🦞</span><span>Operation&nbsp;Molty</span></div>
    <div class="hud-spacer"></div>
    <div class="stat">
      <span class="lab">Budget left</span>
      <span class="val" id="moneyVal">$250</span>
      <div class="meter"><i id="moneyBar" style="width:100%;background:var(--sand)"></i></div>
    </div>
    <div class="stat">
      <span class="lab">Hull integrity (safety)</span>
      <span class="val" id="safeVal">70</span>
      <div class="meter"><i id="safeBar" style="width:70%;background:var(--foam)"></i></div>
    </div>
    <button class="guide-btn" id="guideOpen">📖 Field Guide · <b id="guideCount">0</b></button>
  </div>
</header>

<div class="wrap">
  <div class="depthrail" id="depthrail"></div>
  <div id="stageMount"></div>
</div>

<!-- Field Guide drawer -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Field Guide glossary">
  <header>
    <h3>📖 Field Guide</h3>
    <button class="close" id="guideClose">Close</button>
  </header>
  <div class="body" id="guideBody">
    <p class="gempty">Tap any <span style="color:var(--foam);border-bottom:1.5px dotted var(--foam)">underlined term</span> in the mission to decode it. Decoded terms collect here.</p>
  </div>
</aside>

<script>
/* ============================================================
   STATE
============================================================ */
const state = {
  money: 250,
  moneyMax: 250,
  safety: 70,
  stageIndex: 0,
  answered: false,
  learned: {},          // term -> def
};

/* ============================================================
   GLOSSARY  (every term tappable -> Field Guide)
   Authoring helper: t('node') inserts a tappable term.
============================================================ */
const GLOSSARY = {
  "open-source": "Software whose code is public and free to read, use, and modify. OpenClaw is open-source — the program costs nothing; you only pay for the AI brain and any hardware/hosting.",
  "local": "Running on a computer you control, not on someone else's servers. OpenClaw is 'local-first': it lives on your own machine.",
  "host": "The specific computer (or server) a program runs on. Whatever you pick as the host, the agent can potentially touch the files and programs on it.",
  "agent": "An AI that doesn't just chat back — it can take actions: run commands, browse, send messages, edit files. Power and risk both come from this.",
  "gateway": "OpenClaw's always-running control center. It connects your chat apps to the agent and manages sessions. The repo calls it the 'control plane'.",
  "blast radius": "How much damage something could do if it goes wrong. Putting the agent on a machine full of personal files = large blast radius. A dedicated/empty machine = small.",
  "Raspberry Pi": "A tiny, cheap (~$80) low-power computer, popular for always-on hobby projects. A common 'dedicated box' for running an assistant away from your main machine.",
  "VPS": "Virtual Private Server — a small computer you rent in a data center, billed monthly (often a few dollars). Always-on, but it lives on the internet so it must be locked down carefully.",
  "user account": "A separate login on your computer with its own files and permissions. Running the agent under its own account walls it off from your personal stuff.",
  "untrusted input": "Any message or content the agent reads that didn't come from you — a stranger's DM, a web page. It must be treated as possibly hostile, never automatically obeyed.",
  "Node.js": "A 'runtime' — a program that lets JavaScript code run directly on your computer (outside a web browser). OpenClaw is built on it, so you install Node.js first.",
  "runtime": "The underlying engine a program needs in order to run. OpenClaw's runtime is Node.js.",
  "terminal": "Also called the 'command line' — a text window where you type commands to your computer instead of clicking. This is where you'll run the install commands.",
  "LTS": "Long-Term Support — a software version that gets maintained and patched for years. Safer/steadier than the newest experimental release.",
  "version manager": "A tool (like 'nvm') that lets you install and switch between multiple versions of Node.js easily. Handy but one extra layer to learn.",
  "npm": "Node's package manager — the tool that downloads and installs Node programs from the internet. You'll use it to fetch OpenClaw.",
  "package": "A bundle of code published so others can install it with one command. 'openclaw' is a package.",
  "global install": "Installing a program (with the -g flag) so its command works from anywhere on your computer, not just one folder.",
  "CLI": "Command-Line Interface — controlling a program by typing commands. 'openclaw ...' is a CLI.",
  "daemon": "A program that runs quietly in the background and keeps running, even after you close the terminal. This is what keeps Molty 'always on'.",
  "onboarding wizard": "A guided, step-by-step setup that asks you questions and configures things for you. OpenClaw's is 'openclaw onboard'.",
  "channel": "The app you actually message your assistant through — WebChat, Telegram, Discord, WhatsApp, etc.",
  "WebChat": "A simple chat window in your browser, served by your own gateway. Nothing extra to expose to the outside world — the safest first channel.",
  "prompt injection": "An attack where hidden instructions are buried inside a message, email, or web page, hoping the agent reads them and obeys them as if they were your orders. The headline risk of agents.",
  "allowlist": "An explicit list of who is permitted to talk to the agent. Anyone not on it is ignored. The opposite of leaving the door open to everyone.",
  "DM pairing": "OpenClaw's safe default: a stranger who messages your bot just gets a pairing code and is ignored until YOU approve them. Keeps unknown people from driving the agent.",
  "doctor": "A built-in check ('openclaw doctor') that scans your setup and warns about risky or misconfigured settings before they bite you.",
  "LLM": "Large Language Model — the AI trained on huge amounts of text that can read and write language. It's the 'brain' the agent borrows to think.",
  "API": "Application Programming Interface — a doorway that lets one program talk to another over the internet. OpenClaw calls the AI provider's API to get answers.",
  "model": "A specific AI brain you can pick, e.g. Claude, GPT, Gemini. Each has different strengths, speeds, and prices.",
  "flagship": "A provider's strongest, newest model. Best quality (recommended for an agent that can act), usually a bit pricier per use.",
  "tokens": "The units AI providers bill by — roughly chunks of words read and written. More conversation = more tokens = more cost.",
  "local model": "An AI brain that runs on your own computer instead of a paid cloud. Free to run, private, but needs a powerful machine and is usually weaker.",
  "API key": "A secret password-like string (Claude's start with sk-ant-...) that proves to the provider it's really your account making requests — and that bills your account. Guard it like a password.",
  "billing": "Connecting a payment method and adding credit so the provider will answer your agent's requests. The software is free; the thinking is pay-as-you-go.",
  "credits": "Prepaid balance with the AI provider that gets drawn down as your agent uses tokens.",
  "spend limit": "A cap you set on the provider's side so usage can't exceed a chosen dollar amount — your safety net against a runaway agent running up a huge bill.",
  "revoke": "Instantly disabling an API key so it stops working — what you do the moment a key leaks or you suspect it's exposed.",
  "environment variable": "A setting stored in your system (not typed into code) used to hand secrets like API keys to programs safely.",
  "config file": "A plain text file (OpenClaw uses ~/.openclaw/openclaw.json) that stores your settings, like which model to use.",
  "sandbox": "A walled-off space where the agent can run risky things without reaching your real files — recommended once others (not just you) can message it.",
};

// turn "node" style key text into a tappable button
function t(key, label){
  const def = GLOSSARY[key];
  const text = label || key;
  if(!def){ return text; }
  return `<button class="t" data-term="${encodeURIComponent(key)}">${text}</button>`;
}
function cmd(lines, cap){
  const body = lines.map(l=>{
    if(l.startsWith('#')) return `<span class="c-note">${l}</span>`;
    return `<span class="c-prompt">$ </span>${l}`;
  }).join('\n');
  return (cap?`<div class="cmd-cap">${cap}</div>`:'') + `<div class="cmd">${body}</div>`;
}

/* ============================================================
   STAGES
============================================================ */
const STAGES = [

/* 0 — BRIEFING */
{
  type:'intro',
  eyebrow:'Mission briefing · Depth 0m',
  title:'Operation Molty',
  render(){
    return `
    <p class="story">A space lobster needs a home. Your job: install OpenClaw on your own machine and give it a brain — Claude — without sinking your own ship along the way.</p>
    <div class="teach">
      <p>${t('agent','OpenClaw is an AI agent')}: not just a chatbot, but software that can take real actions on a computer — run commands, browse, message people. That's exactly why it's powerful, and exactly why installing it <em>safely</em> is the whole point of this mission.</p>
      <p>You'll do every step you'd do in real life, in order, with the real commands. Two gauges ride along at the top:</p>
      <p><b style="color:var(--sand)">Budget</b> — in-game money that mirrors real costs. The ${t('open-source','OpenClaw software is free and open-source')}; what costs money is the AI ${t('API','brain')} and any hardware. <br>
      <b style="color:var(--foam)">Hull integrity</b> — your safety score. Convenient shortcuts often poke holes in it. The game will always show you the trade before you choose.</p>
    </div>
    <div class="callout safe"><span class="ctitle">How to play</span>Read the situation, weigh the pros &amp; cons shown on each option, then choose. Tap any <span style="color:var(--foam);border-bottom:1.5px dotted var(--foam)">underlined word</span> to decode the jargon into plain language — it gets saved in your Field Guide.</div>
    `;
  },
  cta:'Begin the dive ↓'
},

/* 1 — WHERE WILL MOLTY LIVE */
{
  eyebrow:'Stage 1 · Depth 10m',
  title:'Where will Molty live?',
  story:'Before anything installs, decide which computer becomes the agent\'s home.',
  render(){ return `
    <div class="teach">
      <p>OpenClaw is ${t('local','local-first')}: it runs on a machine <em>you</em> own, called the ${t('host','host')}. Here's the catch — by default the ${t('agent','agent')} can read files and run programs on its host. So choosing the host <em>is</em> a security decision, not just a convenience one.</p>
      <p>Think about ${t('blast radius','blast radius')}: if the agent ever misbehaves or gets tricked, how much could it reach?</p>
    </div>`; },
  choices:[
    { name:'Your everyday laptop', tag:{cls:'free',txt:'$0'}, cost:0, safety:-15,
      pros:['Free — nothing to buy','Already set up and familiar'],
      cons:['Agent shares a machine with your photos, documents, saved logins','Largest blast radius if something goes wrong'],
      result:'Cheapest path, but you just handed the agent a house full of your stuff. Doable for learning — only if you stay strict on the security stages ahead.' },
    { name:'A dedicated cheap box (Raspberry Pi)', tag:{cls:'cost',txt:'–$80'}, cost:80, safety:+18, rec:true,
      pros:['Keeps the agent away from your personal data','Small blast radius — a compromise stays contained','Low power, can run 24/7'],
      cons:['Costs about $80','A little extra setup'],
      result:'The pro move. A ${PI} lives in the corner doing one job, so even a bad day can\'t reach your real files.' },
    { name:'A rented cloud server (VPS)', tag:{cls:'cost',txt:'–$6'}, cost:6, safety:+4,
      pros:['Always-on and isolated from your home computer','Reach it from anywhere'],
      cons:['Monthly fee','Lives on the open internet — must be locked down carefully','More advanced to secure'],
      result:'Isolated from your home machine, which is good — but a ${VPS} on the public internet raises the stakes on every security step. Fine if you\'re careful.' },
  ]
},

/* 2 — CLEAR THE DECK */
{
  eyebrow:'Stage 2 · Depth 20m',
  title:'Clear the deck',
  story:'Whatever host you picked, reduce what the agent could touch before it arrives.',
  render(){ return `
    <div class="teach">
      <p>Real installers do a quick safety pass first, because the agent treats stranger messages and web pages as ${t('untrusted input','untrusted input')} — and on its host it has real reach. Less exposed = safer.</p>
      <p>The cleanest move is to give Molty its own ${t('user account','user account')} so it's walled off from your personal files.</p>
    </div>`; },
  choices:[
    { name:'Create a separate user account for Molty', tag:{cls:'free',txt:'$0'}, cost:0, safety:+12, rec:true,
      pros:['Walls the agent off from your personal files','Easy to wipe and start over','Costs nothing but a few minutes'],

/* ============================================================
   RESULT-TEXT TERM SHORTCUTS  (${PI} etc -> tappable terms)
============================================================ */
const RESULT_TERMS = {
  PI:['Raspberry Pi','dedicated box'], VPS:['VPS','rented server'], ACCOUNT:['user account','separate account'],
  LTS:['LTS','LTS'], NVM:['version manager','version manager'], DAEMON:['daemon','daemon'],
  WEBCHAT:['WebChat','WebChat'], ALLOW:['allowlist','allowlist'], DOC:['doctor','doctor'],
  FLAG:['flagship','flagship model'], LOCAL:['local model','local model'], LIMIT:['spend limit','spend limit'],
};
function expandResult(str){
  return str.replace(/\$\{(\w+)\}/g,(m,k)=>{
    const e = RESULT_TERMS[k]; return e ? t(e[0], e[1]) : m;
  });
}

/* ============================================================
   RENDER ENGINE
============================================================ */
const mount = document.getElementById('stageMount');

function renderDepthRail(){
  const rail = document.getElementById('depthrail');
  rail.innerHTML = STAGES.map((s,i)=>{
    let cls='dot';
    if(i<state.stageIndex) cls+=' done';
    else if(i===state.stageIndex) cls+=' cur';
    return `<span class="${cls}"></span>`;
  }).join('');
}

function renderStage(){
  const s = STAGES[state.stageIndex];
  state.answered=false;
  renderDepthRail();

  if(s.type==='intro'){
    mount.innerHTML = `<div class="card">
      <p class="eyebrow">${s.eyebrow}</p>
      <h1 class="title">${s.title}</h1>
      ${s.render()}
      <div class="btnrow"><button class="btn" id="advance">${s.cta}</button></div>
    </div>`;
    document.getElementById('advance').onclick = ()=>{ next(); };
    bindTerms();
    return;
  }

  const choicesHTML = s.choices.map((c,i)=>`
    <button class="choice" data-i="${i}">
      <div class="chead">
        <span class="cname">${c.name}</span>
        ${c.rec?'<span class="tag rec">recommended</span>':''}
        ${c.tag?`<span class="tag ${c.tag.cls==='bad'?'':c.tag.cls}" style="${c.tag.cls==='bad'?'color:var(--coral-soft);border-color:rgba(255,107,87,.5)':''}">${c.tag.txt}</span>`:''}
      </div>
      <div class="pc">
        <div class="pro"><h4>Pros</h4><ul>${c.pros.map(p=>`<li>${expandResult(p)}</li>`).join('')}</ul></div>
        <div class="con"><h4>Cons</h4><ul>${c.cons.map(p=>`<li>${expandResult(p)}</li>`).join('')}</ul></div>
      </div>
    </button>`).join('');

  mount.innerHTML = `<div class="card">
    <p class="eyebrow">${s.eyebrow}</p>
    <h1 class="title">${s.title}</h1>
    ${s.story?`<p class="story">${s.story}</p>`:''}
    ${s.render()}
    <div class="choices" id="choices">${choicesHTML}</div>
    <div id="resultSlot"></div>
  </div>`;

  document.querySelectorAll('#choices .choice').forEach(btn=>{
    btn.onclick = ()=> choose(parseInt(btn.dataset.i,10));
  });
  bindTerms();
}

function choose(i){
  if(state.answered) return;
  state.answered=true;
  const s = STAGES[state.stageIndex];
  const c = s.choices[i];

  // apply effects
  if(c.cost) changeMoney(-c.cost);
  if(c.safety) changeSafety(c.safety);

  // lock & dim other choices
  document.querySelectorAll('#choices .choice').forEach((b,idx)=>{
    b.style.pointerEvents='none';
    if(idx!==i){ b.style.opacity='.4'; }
    else { b.style.borderColor='var(--foam)'; }
  });

  const deltas = [];
  if(c.cost) deltas.push(`<span class="delta spend">– $${c.cost}</span>`);
  if(c.safety>0) deltas.push(`<span class="delta up">▲ Hull +${c.safety}</span>`);
  if(c.safety<0) deltas.push(`<span class="delta down">▼ Hull ${c.safety}</span>`);

  const slot = document.getElementById('resultSlot');
  if(c.finish){
    slot.innerHTML = `<div class="result">
      <div class="deltas">${deltas.join('')}</div>
      <div class="btnrow"><button class="btn" id="advance">Surface 🦞</button></div>
    </div>`;
    document.getElementById('advance').onclick = ()=> renderVictory();
  } else {
    slot.innerHTML = `<div class="result">
      <p class="rtitle">${c.safety<-10?'⚠ ':''}${c.rec?'✓ ':''}Outcome</p>
      <p>${expandResult(c.result)}</p>
      <div class="deltas">${deltas.join('')}</div>
      <div class="btnrow"><button class="btn" id="advance">Descend deeper ↓</button></div>
    </div>`;
    document.getElementById('advance').onclick = ()=> next();
  }
  bindTerms();
  slot.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function next(){
  state.stageIndex++;
  if(state.stageIndex>=STAGES.length){ renderVictory(); return; }
  window.scrollTo({top:0,behavior:'smooth'});
  renderStage();
}

  mount.innerHTML = `<div class="card victory">

    <h1 class="title">Molty is alive. 🦞</h1>

      <li>Ran <code>openclaw onboard --install-daemon</code> to set up the always-on gateway.</li>

    <div class="btnrow">
      <button class="btn" id="restart">Play again</button>
      <button class="btn ghost" id="openGuide2">Review Field Guide (${Object.keys(state.learned).length})</button>
    </div>
    <p class="footnote">A teaching game. Commands reflect OpenClaw\'s real setup, but always follow the official docs (docs.openclaw.ai) for the current steps and current Claude pricing before installing for real.</p>
  </div>`;
  document.getElementById('restart').onclick = ()=>{
    state.money=250; state.moneyMax=250; state.safety=70; state.stageIndex=0; state.answered=false;
    updateHUD(); window.scrollTo({top:0}); renderStage();
  };
  document.getElementById('openGuide2').onclick = openDrawer;
  bindTerms();
}

/* ============================================================
   HUD updates
============================================================ */
function changeMoney(d){ state.money=Math.max(0,state.money+d); updateHUD(); }
function changeSafety(d){ state.safety=Math.max(0,Math.min(100,state.safety+d)); updateHUD(); }
function updateHUD(){
  document.getElementById('moneyVal').textContent = '$'+state.money;
  document.getElementById('moneyBar').style.width = Math.round(state.money/state.moneyMax*100)+'%';
  const sv=document.getElementById('safeVal'); sv.textContent = state.safety;
  const sb=document.getElementById('safeBar');
  sb.style.width = state.safety+'%';
  sb.style.background = state.safety>=65?'var(--foam)':state.safety>=40?'var(--warn)':'var(--bad)';
  sv.style.color = state.safety>=65?'var(--foam)':state.safety>=40?'var(--warn)':'var(--bad)';
}

/* ============================================================
   FIELD GUIDE (terms)
============================================================ */
function bindTerms(){
  document.querySelectorAll('.t').forEach(btn=>{
    if(btn.dataset.bound) return;
    btn.dataset.bound='1';
    btn.onclick = ()=>{
      const key = decodeURIComponent(btn.dataset.term);
      learnTerm(key);
      openDrawer(key);
    };
  });
}
function learnTerm(key){
  if(!state.learned[key]){
    state.learned[key]=GLOSSARY[key];
    document.getElementById('guideCount').textContent = Object.keys(state.learned).length;
  }
}
function renderGuide(highlight){
  const body=document.getElementById('guideBody');
  const keys=Object.keys(state.learned);
  if(keys.length===0){
    body.innerHTML=`<p class="gempty">Tap any <span style="color:var(--foam);border-bottom:1.5px dotted var(--foam)">underlined term</span> in the mission to decode it. Decoded terms collect here.</p>`;
    return;
  }
  body.innerHTML = keys.map(k=>`
    <div class="gterm ${k===highlight?'hot':''}" data-k="${encodeURIComponent(k)}">
      <div class="gname">${k}</div>
      <div class="gdef">${state.learned[k]}</div>
    </div>`).join('');
  if(highlight){
    const el=body.querySelector(`[data-k="${encodeURIComponent(highlight)}"]`);
    if(el) el.scrollIntoView({block:'center'});
  }
}
const scrim=document.getElementById('scrim');
const drawer=document.getElementById('drawer');
function openDrawer(highlight){
  renderGuide(typeof highlight==='string'?highlight:null);
  scrim.classList.add('open'); drawer.classList.add('open');
}
function closeDrawer(){ scrim.classList.remove('open'); drawer.classList.remove('open'); }
document.getElementById('guideOpen').onclick=()=>openDrawer();
document.getElementById('guideClose').onclick=closeDrawer;
scrim.onclick=closeDrawer;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

/* ============================================================
   BOOT
============================================================ */
updateHUD();
renderStage();
</script>
</body>
